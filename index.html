<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Subha</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:linear-gradient(to right,#ff9a9e,#fad0c4);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, sans-serif;
        }

        .container{
            text-align:center;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        img{
            width:250px;
            height:250px;
            border-radius:50%;
            border:5px solid red;
            object-fit:cover;
        }

        h1{
            color:red;
            font-size:40px;
            margin-top:20px;
        }

        p{
            font-size:22px;
            color:#444;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="Subha.jpg.jpeg" alt="Subha">
    <h1>❤️ I Love You Subha ❤️</h1>
    <p>You are my happiness, my smile, and my forever. 💖</p>
</div>

</body>
</html>
